[env:d1_mini]
platform = espressif8266 @ ~4.2.1
board = d1_mini
framework = arduino

monitor_speed = 115200
upload_speed = 921600

board_build.filesystem = littlefs

; основная прошивка собирается без временного motor_test.cpp
build_src_filter = +<*> -<motor_test.cpp>

build_flags =
    -D PIO_FRAMEWORK_ARDUINO_LWIP2_HIGHER_BANDWIDTH
    -D BEARSSL_SSL_BASIC

lib_deps =
    me-no-dev/ESPAsyncTCP @ ^1.2.2
    https://github.com/esphome/ESPAsyncWebServer.git
    bblanchon/ArduinoJson @ ^7.0.4

; ── Временная сборка: тест вращения мотора ──────────────────────────────────
; pio run -e motortest -t upload   (вернуть прошивку: pio run -t upload)
[env:motortest]
platform = espressif8266 @ ~4.2.1
board = d1_mini
framework = arduino
monitor_speed = 115200
upload_speed = 921600
; компилируем ТОЛЬКО motor_test.cpp (без основного кода/библиотек)
build_src_filter = -<*> +<motor_test.cpp>
